<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="stylesheet" href="./Styles/styles.css">

    <!-- Daisy UI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="shortcut icon" href="./assets/hero-leaf1.png" type="image/x-icon">

    <!-- Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Roboto", sans-serif;
        }
    </style>

</head>

<body>


    <header>

        <!-- NavBar -->
        <section id="navbar">

            <div class="navbar bg-base-100 lg:px-20 shadow-sm bg-[#15803D] text-white">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li><a class="text-black">About</a></li>
                            <li><a class="text-black">Gallery</a></li>
                            <li><a class="text-black">Plant a Tree</a></li>
                        </ul>
                    </div>
                    <a class="font-bold text-xl">Green Earth</a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <ul class="menu menu-horizontal px-1">
                        <li><a>About</a></li>
                        <li><a>Gallery</a></li>
                        <li><a>Plant a Tree</a></li>
                    </ul>
                </div>
                <div class="navbar-end">
                    <a class="btn bg-[#FACC15] text-green-900 rounded-full">Plant a Tree</a>
                </div>
            </div>
        </section>

        <!-- Hero -->

        <section id="hero">

            <div class="hero-container bg-green-100 grid grid-cols-4">

                <div class="image-left">

                    <img src="./assets/hero-leaf1.png" alt="">

                </div>

                <div class="middle-content space-y-5 text-center col-span-2 flex flex-col items-center justify-center">

                    <h1 class="font-bold text-3xl pt-10 lg:text-4xl text-green-900">Plant A Tree, Grow A Future</h1>
                    <p class="text-gray-500">Join our mission to plant 1 million trees and make the Earth greener for
                        future <br>
                        generations.</p>
                    <buttonc class="btn bg-yellow-400 text-green-900">Get Involved</buttonc>



                </div>

                <div class="image-right">
                    <img src="./assets/hero-leaf2.png" alt="">
                </div>


            </div>



        </section>


        <!-- Trees-Categories - Cart -->

        <section class="bg-green-50">

            <h1 class="text-center font-bold text-3xl text-green-900 pt-14 pb-14">Choose Your Trees</h1>


            <div id="main-container" class=" grid grid-cols-12 gap-12 w-11/12 mx-auto">
                <div class="categories col-span-2 shadow-sm shadow-emerald-200">

                    <h2 class="font-bold text-2xl mb-3">Categories</h2>

                    <div class="space-y-3">

                        <div>
                            <button id="btn-all-trees"
                                class="btn bg-green-800 text-white border-0 w-full justify-start">All
                                Trees</button>
                        </div>



                        <div id="categories-container" class="space-y-3">

                            <!-- Manually Category likha lagbe na, Category API theke ashbe.-->
                            <!-- Ei Div e category gulo ene rakhbo -->

                        </div>


                    </div>



                </div>

                <!-- Cards -->
                <div id="" class=" col-span-7 ">

                    <!-- All trees are coming here dynamically -->

                    <div id="tree-cards-container" class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                        <!-- All trees are coming here dynamically -->
                    </div>



                    <div id="loading-spinnerr" class="justify-center items-center h-[60vh] hidden">
                        <span class="loading loading-spinner loading-xl"></span>
                    </div>


                </div>









                <div class="shopping-cart col-span-3 border">

                    <h1 class="text-center font-bold text-2xl text-green-900 p-5">Your Cart</h1>

                    <div id="cart-item-container">


                    </div>



                </div>

            </div>




        </section>





    </header>













    <section>
        <!-- Daisy Check -->




    </section>










    <script src="./JS/script.js"></script>
</body>

</html>
